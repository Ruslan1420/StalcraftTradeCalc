<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stalcraft | Трекер перепродаж</title>
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-exchange-alt"></i>
                <h1>Трекер перепродаж</h1>
            </div>
        </header>
        
        <main class="main-content">
            <!-- Верхний блок - новая сделка -->
            <div class="top-section">
                <div class="price-box">
                    <h2><i class="fas fa-plus-circle"></i> Новая сделка</h2>
                    
                    <div class="form-group">
                        <label>Название предмета</label>
                        <input type="text" id="item-name" placeholder="Например: Артефакт..." class="text-input">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Цена покупки</label>
                            <div class="price-input">
                                <input type="number" id="buy-price" value="0" min="0" class="no-spinner">
                                <span>₽</span>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Цена продажи</label>
                            <div class="price-input">
                                <input type="number" id="sell-price" value="0" min="0" class="no-spinner">
                                <span>₽</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="tax-toggle">
                        <label class="checkbox">
                            <input type="checkbox" id="use-tax" checked>
                            <span>Учитывать налог 5% при продаже</span>
                        </label>
                    </div>
                    
                    <button class="add-btn" id="add-deal">
                        <i class="fas fa-check"></i> Добавить сделку
                    </button>
                </div>
                
                <div class="stats-box">
                    <h2><i class="fas fa-chart-line"></i> Общая статистика</h2>
                    
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-label">Всего затрат</div>
                            <div class="stat-value" id="total-spent">0 ₽</div>
                        </div>
                        
                        <div class="stat-item">
                            <div class="stat-label">Всего доход</div>
                            <div class="stat-value" id="total-revenue">0 ₽</div>
                        </div>
                        
                        <div class="stat-item highlight">
                            <div class="stat-label">Чистая прибыль</div>
                            <div class="stat-value" id="total-profit">0 ₽</div>
                        </div>
                        
                        <div class="stat-item">
                            <div class="stat-label">Кол-во сделок</div>
                            <div class="stat-value" id="deals-count">0</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Нижний блок - история продаж -->
            <div class="history-section">
                <div class="history-header">
                    <h2><i class="fas fa-history"></i> История продаж</h2>
                    <button class="clear-btn" id="clear-history">
                        <i class="fas fa-trash"></i> Очистить всё
                    </button>
                </div>
                
                <div class="table-container">
                    <table class="deals-table" id="deals-table">
                        <thead>
                            <tr>
                                <th>Предмет</th>
                                <th>Покупка</th>
                                <th>Продажа</th>
                                <th>Налог 5%</th>
                                <th>Прибыль</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="deals-list">
                            <!-- Сделки будут добавляться сюда -->
                        </tbody>
                    </table>
                </div>
                
                <div class="empty-state" id="empty-state">
                    <i class="fas fa-shopping-bag"></i>
                    <p>Сделок пока нет. Добавьте первую!</p>
                </div>
            </div>
        </main>
        
        <footer class="footer">
            <div>Stalcraft Resell Tracker</div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
